<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱泽生 | 技术支持</title>
    <style>
        /* ================= 全局暗黑视觉引擎 ================= */
        :root { --bg-color: #121212; --text-color: #e0e0e0; --accent-color: #888888; --border-color: #2a2a2a; --sidebar-width: 300px; }
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 0; transition: background-color 0.3s; }
        
        body.lang-zh .en-only { display: none !important; }
        body.lang-en .zh-only { display: none !important; }

        .top-nav { position: fixed; top: 0; right: 0; left: 0; height: 60px; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: flex-end; align-items: center; padding: 0 40px; z-index: 9999; }
        .nav-links a { text-decoration: none; color: var(--text-color); font-size: 14px; font-weight: 500; margin-left: 25px; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #ffffff; border-bottom: 2px solid #ffffff; padding-bottom: 4px; }
        .lang-toggle { background: #ffffff; color: #000000; border: none; padding: 6px 15px; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 3px; margin-left: 30px; transition: opacity 0.2s; }
        .lang-toggle:hover { opacity: 0.8; }

        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width); padding: 100px 40px 40px; border-right: 1px solid var(--border-color); overflow-y: auto; box-sizing: border-box; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; background-color: #333333; margin-bottom: 25px; object-fit: cover; }
        
        .toc-title { font-size: 12px; font-weight: 700; color: #666; margin-top: 30px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .toc-list { list-style: none; padding: 0; margin: 0; font-size: 13.5px; line-height: 2.2; }
        .toc-list a { color: var(--text-color); text-decoration: none; transition: color 0.2s; display: block; }
        .toc-list a:hover { color: #ffffff; }

        .main-content { margin-left: var(--sidebar-width); padding: 100px 60px 80px 60px; max-width: 800px; }
        .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #888888; margin: 0 0 35px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        
        .content-block { margin-bottom: 60px; scroll-margin-top: 80px; }

        @media (max-width: 900px) {
            .sidebar { position: relative; width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 90px 30px 40px; }
            .main-content { margin-left: 0; padding: 50px 30px; }
        }
    </style>
</head>
<body class="lang-zh">

    <nav class="top-nav">
        <div class="nav-links">
            <a href="index.html" class="zh-only">主页</a>
            <a href="cv.html" class="zh-only">履历</a>
            <a href="projects.html" class="zh-only">项目</a>
            <a href="misc.html" class="zh-only">杂项</a>
            <a href="support.html" class="zh-only active">技术支持</a> <a href="index.html" class="en-only">Home</a>
            <a href="cv.html" class="en-only">CV</a>
            <a href="projects.html" class="en-only">Projects</a>
            <a href="misc.html" class="en-only">Misc</a>
            <a href="support.html" class="en-only active">Support</a> <button class="lang-toggle" onclick="toggleLanguage()" id="lang-btn">EN</button>
        </div>
    </nav>

    <aside class="sidebar">
        <img src="assets/images/avatar.jpg" alt="Avatar" class="avatar" onerror="this.style.display='none'">
        <h1 class="zh-only" style="font-size: 20px; margin: 0 0 5px 0; color: #ffffff;">朱泽生</h1>
        <h1 class="en-only" style="font-size: 20px; margin: 0 0 5px 0; color: #ffffff;">Jeremy ZHU</h1>

        <div class="toc-title zh-only">板块目录</div>
        <div class="toc-title en-only">Contents</div>

        <ul class="toc-list zh-only">
            <li><a href="#placeholder">01. 预留空间</a></li>
        </ul>
        <ul class="toc-list en-only">
            <li><a href="#placeholder">01. Placeholder</a></li>
        </ul>
    </aside>

    <main class="main-content">
        
        <div id="placeholder" class="content-block">
            <h2 class="section-title zh-only">01. 预留空间</h2>
            <h2 class="section-title en-only">01. Placeholder</h2>

            <div class="zh-only" style="width: 100%; height: 200px; background: #1a1a1a; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; color: #666; font-size: 14px;">
                技术支持板块内容构建中，敬请期待...
            </div>
            <div class="en-only" style="width: 100%; height: 200px; background: #1a1a1a; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; color: #666; font-size: 14px;">
                Support section is under construction...
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('siteLang') || 'zh';
            const btn = document.getElementById('lang-btn');
            if (savedLang === 'en') {
                document.body.classList.remove('lang-zh');
                document.body.classList.add('lang-en');
                btn.textContent = '中文';
            }
        });

        function toggleLanguage() {
            const body = document.body;
            const btn = document.getElementById('lang-btn');
            if (body.classList.contains('lang-zh')) {
                body.classList.replace('lang-zh', 'lang-en');
                btn.textContent = '中文';
                localStorage.setItem('siteLang', 'en');
            } else {
                body.classList.replace('lang-en', 'lang-zh');
                btn.textContent = 'EN';
                localStorage.setItem('siteLang', 'zh');
            }
        }
    </script>
</body>
</html>
