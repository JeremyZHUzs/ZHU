<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jer Z | Architecture & Law</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #666666;
            --border-color: #eeeeee;
            --sidebar-width: 280px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* 2. 上方导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 500;
            margin-left: 25px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--accent-color); }

        /* 1. 左侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            padding: 100px 40px 40px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #eee;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .sidebar h1 { font-size: 24px; margin: 0 0 10px; }
        .sidebar .role { font-size: 14px; color: var(--accent-color); margin-bottom: 20px; }
        .sidebar .bio-text { font-size: 13.5px; color: var(--accent-color); margin-bottom: 30px; text-align: justify; }
        
        .contact-info { font-size: 13px; }
        .contact-info div { margin-bottom: 8px; }
        .contact-info a { color: var(--text-color); text-decoration: none; border-bottom: 1px solid var(--border-color); }

        /* 主内容区 */
        .main-content {
            margin-left: calc(var(--sidebar-width) + 40px);
            padding: 100px 60px 80px 20px;
            max-width: 800px;
        }

        /* 中英文切换按钮 */
        .lang-toggle {
            background: #000;
            color: #fff;
            border: none;
            padding: 6px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            border-radius: 2px;
            margin-left: 25px;
        }

        /* 排版样式 */
        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999;
            margin: 60px 0 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .timeline-item { margin-bottom: 40px; }
        .item-header { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 5px; }
        .item-role { font-size: 14px; color: var(--accent-color); font-style: italic; margin-bottom: 10px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .project-card { border: 1px solid var(--border-color); text-decoration: none; color: inherit; }
        .project-img { width: 100%; height: 200px; object-fit: cover; background: #f9f9f9; display: block; }
        .project-info { padding: 15px; font-size: 14px; font-weight: 600; }

        /* 手机端适配 */
        @media (max-width: 850px) {
            .sidebar { position: relative; width: auto; border-right: none; border-bottom: 1px solid var(--border-color); padding: 80px 24px 40px; }
            .main-content { margin-left: 0; padding: 40px 24px; }
            .top-nav { padding: 0 20px; }
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
